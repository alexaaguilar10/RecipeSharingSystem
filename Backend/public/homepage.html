<!DOCTYPE html>
<html lang="en">
<head>
  <title>Recipe Sharing</title>

  <link rel="stylesheet" href="style.css">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="container mt-4">

  <h1 class="text-center">Recipe Sharing Website</h1>
  <h4 class="text-center mt-2" id="welcomeMessage"></h4>

  <div id="authButtons" class="d-flex justify-content-center mt-4"></div>

  <hr>
  
  <h2>Create Recipe</h2>

  <form id="recipeForm" class="mb-4">
    <input class="form-control mb-2" id="title" placeholder="Recipe Title" required>
    <textarea class="form-control mb-2" id="ingredients" placeholder="Ingredients" required></textarea>
    <textarea class="form-control mb-2" id="instructions" placeholder="Instructions" required></textarea>
    <button class="btn btn-success">Post Recipe</button>
  </form>

  <h2>All Recipes</h2>
  <div id="recipeList" class="mt-3"></div>

  <script type="module" src="js/events.js"></script>
  <script type="module" src="js/recipes.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/favorites.js"></script>
  
</body>
</html>
