<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Recipe</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell">
  <main class="container py-4">
    <section class="page-banner d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="h2 mb-1">Start a New Recipe</h1>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-outline-secondary" href="recipes.html">Back</a>
        <a class="btn btn-primary" href="recipes.html">Recipes Page</a>
      </div>
    </section>

    <section class="card shadow-sm border-0 p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Create Recipe</h2>
      </div>
      <form id="recipeForm">
        <input class="form-control mb-2" id="title" placeholder="Recipe Title" required>
        <textarea class="form-control mb-2" id="ingredients" placeholder="Ingredients" required></textarea>
        <textarea class="form-control mb-3" id="instructions" placeholder="Instructions" required></textarea>
        <button class="btn btn-success" type="submit">Post Recipe</button>
      </form>
      <div id="recipeFormMessage" class="small text-muted mt-3"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
